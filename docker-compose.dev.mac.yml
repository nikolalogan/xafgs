name: sxfgssever-dev

services:
  frontend:
    image: ${BASE_REGISTRY:-docker.1panel.live}/library/node:22-alpine
    working_dir: /app
    environment:
      TZ: "Asia/Shanghai"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      WATCHPACK_POLLING_INTERVAL: "1000"
      NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"
      APK_MIRROR: "${APK_MIRROR:-mirrors.aliyun.com}"
    volumes:
      - ./web:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "sed -i \"s|dl-cdn.alpinelinux.org|$${APK_MIRROR}|g\" /etc/apk/repositories
      && apk add --no-cache tzdata
      && npm install --no-audit --no-fund
      && npm run dev -- --hostname 0.0.0.0 --port 5173"
    expose:
      - "5173"
    ports:
      - "5173:5173"
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
      args:
        BASE_REGISTRY: "${BASE_REGISTRY:-docker.1panel.live}"
        APT_MIRROR: "${APT_MIRROR:-https://mirrors.aliyun.com/debian}"
        APT_SECURITY_MIRROR: "${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}"
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}"
        PIP_TRUSTED_HOST: "${PIP_TRUSTED_HOST:-mirrors.aliyun.com}"
        GOPROXY: "${GOPROXY:-https://goproxy.cn,direct}"
        GOSUMDB: "${GOSUMDB:-sum.golang.google.cn}"
    image: sxfgssever-backend-dev:latest
    working_dir: /app
    volumes:
      - ./server:/app
      - /Users/logan/Documents/code/pgfile:/data/uploads
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      TZ: "Asia/Shanghai"
      PORT: "8080"
      APP_NAME: "sxfgssever-api"
      API_TOKEN: "dev-token"
      FILE_STORAGE_ROOT: "/data/uploads"
      OCR_SERVICE_BASE_URL: "http://ocr-service:8090"
      PDF_DEBUG_LOG: "1"
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "sum.golang.google.cn"
      DATABASE_URL: "postgres://sxfg:sxfg_password@postgres:5432/sxfg?sslmode=disable"
    command: >
      sh -c "go mod tidy
      && air -c .air.toml"
    expose:
      - "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped

  ocr-service:
    platform: linux/amd64
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
      args:
        BASE_REGISTRY: "${OCR_BASE_REGISTRY:-docker.1panel.live}"
        APT_MIRROR: "${APT_MIRROR:-https://mirrors.aliyun.com/debian}"
        APT_SECURITY_MIRROR: "${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}"
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}"
        PIP_TRUSTED_HOST: "${PIP_TRUSTED_HOST:-mirrors.aliyun.com}"
        PIP_DEFAULT_TIMEOUT: "${PIP_DEFAULT_TIMEOUT:-600}"
        PIP_RETRIES: "${PIP_RETRIES:-10}"
        OCR_WHEELS_ONLY: "${OCR_WHEELS_ONLY:-1}"
    image: sxfgssever-ocr-service-dev:latest
    gpus: all
    environment:
      TZ: "Asia/Shanghai"
      GLM_BASE_URL: "${GLM_BASE_URL:-http://vllm:8000}"
      GLM_MODEL: "${GLM_MODEL:-zai-org/GLM-OCR}"
      GLM_API_KEY: "${GLM_API_KEY:-}"
      GLM_AUTH_MODE: "${GLM_AUTH_MODE:-none}"
      GLM_TIMEOUT_MS: "${GLM_TIMEOUT_MS:-120000}"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
      OMP_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      FLAGS_use_mkldnn: "0"
      FLAGS_enable_pir_api: "0"
      FLAGS_enable_pir_in_executor: "0"
      CPU_NUM: "1"
    command: >
      sh -c "uvicorn app.service:app --host 0.0.0.0 --port 8090"
    depends_on:
      gateway:
        condition: service_started
    expose:
      - "8090"
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8090)); s.close(); sys.exit(0)\""]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  docling-service:
    build:
      context: ./docling-service
      dockerfile: Dockerfile
      args:
        BASE_REGISTRY: "${BASE_REGISTRY:-docker.1panel.live}"
        APT_MIRROR: "${APT_MIRROR:-https://mirrors.aliyun.com/debian}"
        APT_SECURITY_MIRROR: "${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}"
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}"
        PIP_TRUSTED_HOST: "${PIP_TRUSTED_HOST:-mirrors.aliyun.com}"
        PIP_DEFAULT_TIMEOUT: "${PIP_DEFAULT_TIMEOUT:-600}"
        PIP_RETRIES: "${PIP_RETRIES:-10}"
        DOCLING_WHEELS_ONLY: "${DOCLING_WHEELS_ONLY:-1}"
    image: sxfgssever-docling-service-dev:latest
    environment:
      TZ: "Asia/Shanghai"
      DOCLING_ARTIFACTS_PATH: "/opt/docling-models"
      DOCLING_SERVE_ARTIFACTS_PATH: "/opt/docling-models"
      HF_HOME: "/opt/docling-models/hf"
      HF_HUB_CACHE: "/opt/docling-models/hf/hub"
      HF_ENDPOINT: "${HF_ENDPOINT:-https://hf-mirror.com}"
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
    expose:
      - "8091"
    ports:
      - "8091:8091"
    volumes:
      - ./docling-service/model_cache:/opt/docling-models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import socket,sys; s=socket.socket(); s.settimeout(2); s.connect(('127.0.0.1', 8091)); s.close(); sys.exit(0)\""]
      interval: 10s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  vllm:
    image: "${VLLM_IMAGE:-docker.1panel.live/vllm/vllm-openai:latest}"
    gpus: all
    environment:
      TZ: "Asia/Shanghai"
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    command:
      - "/models/glm-ocr"
      - "--allowed-local-media-path"
      - "/"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--served-model-name"
      - "zai-org/GLM-OCR"
      - "--trust-remote-code"
    volumes:
      - ./ocr-service/model_cache/glm:/models/glm-ocr:ro
      - ./ocr-service/model_cache/hf:/root/.cache/huggingface
    expose:
      - "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request,sys; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=2); sys.exit(0)\""]
      interval: 15s
      timeout: 5s
      retries: 120
      start_period: 20m
    depends_on:
      ocr-service:
        condition: service_started
    restart: unless-stopped

  gateway:
    image: ${BASE_REGISTRY:-docker.1panel.live}/library/nginx:alpine
    container_name: sxfgssever-dev-gateway
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "325:80"
    volumes:
      - ./deploy/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - docling-service
    restart: unless-stopped

  postgres:
    image: ${BASE_REGISTRY:-docker.1panel.live}/pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      TZ: "Asia/Shanghai"
      PGTZ: "Asia/Shanghai"
      POSTGRES_DB: sxfg
      POSTGRES_USER: sxfg
      POSTGRES_PASSWORD: sxfg_password
    volumes:
      - /Users/logan/Documents/code/pgsql:/var/lib/postgresql/data
      - ./deploy/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: ["postgres", "-c", "listen_addresses=*", "-c", "hba_file=/etc/postgresql/pg_hba.conf", "-c", "timezone=Asia/Shanghai"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sxfg -d sxfg"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: ${REDIS_IMAGE:-docker.1panel.live/library/redis:8-alpine}
    environment:
      TZ: "Asia/Shanghai"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  frontend_node_modules:
  go_pkg_mod:
  go_build_cache:
  redisdata:
