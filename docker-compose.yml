name: sxfgssever-prod

services:
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      APP_NAME: "sxfgssever-api"
      API_TOKEN: "dev-token"
      DATABASE_URL: "postgres://sxfgs:Jbb%401234@192.168.109.4:55432/sxfgs_restore?sslmode=disable"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  gateway:
    image: docker.1panel.live/library/nginx:1.27-alpine
    container_name: sxfgssever-gateway
    ports:
      - "325:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  redis:
    image: docker.1panel.live/library/redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  redisdata:
