name: sxfgssever-prod

services:
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: sxfgssever-frontend-prod:latest
    environment:
      TZ: "Asia/Shanghai"
      NODE_ENV: "production"
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: sxfgssever-backend-prod:latest
    environment:
      TZ: "Asia/Shanghai"
      PORT: "8080"
      APP_NAME: "sxfgssever-api"
      API_TOKEN: "dev-token"
      FILE_STORAGE_ROOT: "/data/uploads"
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "sum.golang.google.cn"
      DATABASE_URL: "postgres://sxfgs:Jbb%401234@192.168.109.4:5432/sxfgs?sslmode=disable"
    volumes:
      - /home/logan/sxfgs/file:/data/uploads
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_started
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: sxfgssever-prod-gateway
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "325:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    environment:
      TZ: "Asia/Shanghai"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  redisdata:
