name: sxfgssever

services:
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    environment:
      PORT: "8080"
      APP_NAME: "sxfgssever-api"
      API_TOKEN: "dev-token"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: sxfgssever-gateway
    ports:
      - "325:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sxfg
      POSTGRES_USER: sxfg
      POSTGRES_PASSWORD: sxfg_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sxfg -d sxfg"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
