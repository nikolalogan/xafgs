name: sxfgssever-prod

services:
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        BASE_REGISTRY: "${BASE_REGISTRY:-docker.m.daocloud.io}"
        NPM_REGISTRY: "${NPM_REGISTRY:-https://registry.npmmirror.com}"
    image: sxfgssever-frontend-prod:latest
    environment:
      TZ: "Asia/Shanghai"
      NODE_ENV: "production"
    expose:
      - "3000"
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      args:
        BASE_REGISTRY: "${BASE_REGISTRY:-docker.m.daocloud.io}"
        APT_MIRROR: "${APT_MIRROR:-https://mirrors.aliyun.com/debian}"
        APT_SECURITY_MIRROR: "${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}"
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}"
        PIP_TRUSTED_HOST: "${PIP_TRUSTED_HOST:-mirrors.aliyun.com}"
        OCR_WHEELS_ONLY: "${OCR_WHEELS_ONLY:-0}"
        GOPROXY: "${GOPROXY:-https://goproxy.cn,direct}"
        GOSUMDB: "${GOSUMDB:-sum.golang.google.cn}"
    image: sxfgssever-backend-prod:latest
    environment:
      TZ: "Asia/Shanghai"
      PORT: "8080"
      APP_NAME: "sxfgssever-api"
      API_TOKEN: "dev-token"
      FILE_STORAGE_ROOT: "/data/uploads"
      OCR_SERVICE_BASE_URL: "http://ocr-service:8090"
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "sum.golang.google.cn"
      DATABASE_URL: "postgres://sxfgs:Jbb%401234@192.168.109.4:5432/sxfgs?sslmode=disable"
    volumes:
      - /home/logan/sxfgs/file:/data/uploads
    expose:
      - "8080"
    depends_on:
      redis:
        condition: service_started
      ocr-service:
        condition: service_started
    restart: unless-stopped

  ocr-service:
    build:
      context: ./ocr-service
      dockerfile: Dockerfile
      args:
        BASE_REGISTRY: "${BASE_REGISTRY:-docker.m.daocloud.io}"
        APT_MIRROR: "${APT_MIRROR:-https://mirrors.aliyun.com/debian}"
        APT_SECURITY_MIRROR: "${APT_SECURITY_MIRROR:-https://mirrors.aliyun.com/debian-security}"
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}"
        PIP_TRUSTED_HOST: "${PIP_TRUSTED_HOST:-mirrors.aliyun.com}"
    image: sxfgssever-ocr-service-prod:latest
    environment:
      TZ: "Asia/Shanghai"
      OCR_LOCAL_PPSTRUCTURE_ENABLED: "1"
      OCR_PPSTRUCTURE_DEVICE: "cpu"
      OCR_PPSTRUCTURE_LANG: "ch"
      OCR_PPSTRUCTURE_ENABLE_TABLES: "1"
      OCR_PPSTRUCTURE_USE_REGION_DETECTION: "1"
      OCR_PPSTRUCTURE_MODEL_ROOT: "/models/paddleocr"
    expose:
      - "8090"
    restart: unless-stopped

  gateway:
    image: ${BASE_REGISTRY:-docker.m.daocloud.io}/library/nginx:1.27-alpine
    container_name: sxfgssever-prod-gateway
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "325:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  redis:
    image: ${BASE_REGISTRY:-docker.m.daocloud.io}/library/redis:8-alpine
    environment:
      TZ: "Asia/Shanghai"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  redisdata:
