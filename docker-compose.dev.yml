name: sxfgssever-dev

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      TZ: "Asia/Shanghai"
      CHOKIDAR_USEPOLLING: "true"
      NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"
    volumes:
      - ./web:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "apk add --no-cache tzdata
      && npm install --no-audit --no-fund
      && npm run dev -- --hostname 0.0.0.0 --port 5173"
    expose:
      - "5173"
    ports:
      - "5173:5173"
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    image: sxfgssever-backend-dev:latest
    working_dir: /app
    volumes:
      - ./server:/app
      - /Users/logan/Documents/code/pgfile:/data/uploads
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      TZ: "Asia/Shanghai"
      PORT: "8080"
      APP_NAME: "sxfgssever-api"
      API_TOKEN: "dev-token"
      FILE_STORAGE_ROOT: "/data/uploads"
      PDF_DEBUG_LOG: "1"
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "sum.golang.google.cn"
      DATABASE_URL: "postgres://sxfg:sxfg_password@postgres:5432/sxfg?sslmode=disable"
    command: >
      sh -c "go mod tidy
      && air -c .air.toml"
    expose:
      - "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: sxfgssever-dev-gateway
    environment:
      TZ: "Asia/Shanghai"
    ports:
      - "325:80"
    volumes:
      - ./deploy/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      TZ: "Asia/Shanghai"
      PGTZ: "Asia/Shanghai"
      POSTGRES_DB: sxfg
      POSTGRES_USER: sxfg
      POSTGRES_PASSWORD: sxfg_password
    volumes:
      - /Users/logan/Documents/code/pgsql:/var/lib/postgresql/data
      - ./deploy/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    command: ["postgres", "-c", "listen_addresses=*", "-c", "hba_file=/etc/postgresql/pg_hba.conf", "-c", "timezone=Asia/Shanghai"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sxfg -d sxfg"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    environment:
      TZ: "Asia/Shanghai"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  frontend_node_modules:
  go_pkg_mod:
  go_build_cache:
  redisdata:
