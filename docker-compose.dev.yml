name: sxfgssever-dev

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      CHOKIDAR_USEPOLLING: "true"
      NPM_CONFIG_REGISTRY: "https://registry.npmmirror.com"
    volumes:
      - ./web:/app
      - frontend_node_modules:/app/node_modules
    command: >
      sh -c "if [ ! -x node_modules/.bin/vite ]; then npm install; fi
      && npm run dev -- --host 0.0.0.0 --port 5173"
    expose:
      - "5173"
    ports:
      - "5173:5173"
    restart: unless-stopped

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    image: sxfgssever-backend-dev:latest
    working_dir: /app
    volumes:
      - ./server:/app
      - go_pkg_mod:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    environment:
      PORT: "8080"
      APP_NAME: "sxfgssever-api"
      API_TOKEN: "dev-token"
      GOPROXY: "https://goproxy.cn,direct"
      GOSUMDB: "sum.golang.google.cn"
    command: >
      sh -c "if [ ! -f go.sum ]; then go mod tidy; fi
      && air -c .air.toml"
    expose:
      - "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  gateway:
    image: nginx:1.27-alpine
    container_name: sxfgssever-dev-gateway
    ports:
      - "325:80"
    volumes:
      - ./deploy/nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sxfg
      POSTGRES_USER: sxfg
      POSTGRES_PASSWORD: sxfg_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sxfg -d sxfg"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  frontend_node_modules:
  go_pkg_mod:
  go_build_cache:
  pgdata:
  redisdata:
