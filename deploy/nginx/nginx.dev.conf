events {}

http {
  include /etc/nginx/mime.types;
  sendfile on;
  client_max_body_size 1024m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  map $http_x_forwarded_proto $forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
  }

  map $http_x_forwarded_host $forwarded_host {
    default $http_x_forwarded_host;
    "" $host;
  }
  upstream frontend_dev {
    server frontend:5173;
  }

  upstream backend_dev {
    server backend:8080;
  }

  upstream ocr_service_dev {
    server ocr-service:8090;
  }

  upstream docling_service_dev {
    server docling-service:8091;
  }

  server {
    listen 80;
    server_name _;

    location / {
      proxy_http_version 1.1;
      proxy_pass http://frontend_dev;
      proxy_set_header Host $forwarded_host;
      proxy_set_header X-Forwarded-Host $forwarded_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
    }

    location /api/ {
      proxy_http_version 1.1;
      # dev 下 backend 使用 air 热重载时会重启进程，upstream keepalive 容易复用到已关闭的连接，
      # 导致 intermittent "upstream prematurely closed connection while reading response header"。
      # 这里显式关闭 keepalive，换取稳定性。
      proxy_set_header Connection "close";
      proxy_pass http://backend_dev;
      proxy_set_header Host $forwarded_host;
      proxy_set_header X-Forwarded-Host $forwarded_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /ocr/ {
      proxy_http_version 1.1;
      proxy_pass http://ocr_service_dev/;
      proxy_set_header Host $forwarded_host;
      proxy_set_header X-Forwarded-Host $forwarded_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location /docling/ {
      proxy_http_version 1.1;
      proxy_pass http://docling_service_dev/;
      proxy_connect_timeout 60s;
      proxy_send_timeout 600s;
      proxy_read_timeout 600s;
      proxy_set_header Host $forwarded_host;
      proxy_set_header X-Forwarded-Host $forwarded_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location ~ ^/api/workflow/executions/[^/]+/stream$ {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      chunked_transfer_encoding on;
      proxy_pass http://backend_dev;
      proxy_set_header Host $forwarded_host;
      proxy_set_header X-Forwarded-Host $forwarded_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

  }
}
